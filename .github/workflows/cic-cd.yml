name: Build And Push to ECR

on:
   push:
       #pull_requests:
       #    branches: ['main', 'dev']
       branches: [ 'main' ]


permissions:
    id-token: write
    contents: read

jobs:     
    build_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the Code
              uses: actions/checkout@v7
            - name:   Trivy Scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                security: HIGH,CRITICAL
                exit-code: 0
                
            - name: Build Docker Image
              run: docker build -t 977503779033.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: 977503779033.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
                format: table
                exit-code: 0
                ignore-unfixed: true
                security: CRITICAL,HIGH

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
              with:
                aws-region: us-east-1
                role-to assume: arn:aws:iam::977503779033:role/github-action-role
            - name: Login to Amazon ECR
              id: Login-ecr
              uses: aws-actions/amazon-ecr-login@v2        
            
              




              
