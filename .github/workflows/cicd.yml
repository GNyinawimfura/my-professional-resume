name: My first pipeline

on:
    push: 
       branches: [ "main" ]
jobs:
   build:
      runs-on: ubuntu-latest # macos, windows-latest
      steps:
          - name: Clone the code
            uses: actions/checkout@v4
          -  name: Build image
             run:
               docker build -t GNyinawimfura/cicd-portfolio .
          - name: Docker login
            uses: docker/login-action@v4
            with:
              username: ${{ secrets.DOCKER_USER }}
              password: ${{ secrets.DOCKER_PASS }}
          - name: Push image
            run:
              docker push GNyinawimfura/cicd-portfolio

                        

    
      
 

  