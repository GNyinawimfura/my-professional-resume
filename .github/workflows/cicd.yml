name: My first pipeline

on:
    push: 
       branch: [ "main" ]
jobs:
   build:
      runs-on: ubuntu: # macos, windows-latestt
      steps:
         -name: Clone the code
          uses: actions/checkout@v4
         -name: Build image
          run:
           docker_build -t GNyinawimfura/cicd-porfolio .
         -name: Docker login
          uses: docker/login-action@v4
          with:
          username: GNyinawimfura
          password: ${{ secrets.DOCKER__PASS }}
         -name: Push image
          run:
           docker push GNyinawimfura/cicd-portfolio

                        

    
      
 

  